  # DuckDuckGo queries for "what people are building with AI"
  # Focus: project showcases, step-by-step guides, tutorials with screenshots
  builds_searches:
    - "\"I built\" AI tool guide 2026"
    - "\"built with AI\" step by step tutorial blog post"
    - "AI side project showcase how I built"
    - "site:dev.to \"I built\" AI"
    - "site:dev.to AI project tutorial 2026"
    - "site:indiehackers.com AI tool built"
    - "site:substack.com AI build guide screenshots"
    - "\"how I built\" AI agent workflow tutorial"
    - "\"built an AI\" complete guide walkthrough"
    - "AI automation workflow tutorial screenshots 2026"

  # DuckDuckGo queries used by the general news collector
  # Focus: AI breakthroughs, launches, and research — not funding rounds
  general_news_searches:
    - "AI model released 2026"
    - "AI breakthrough announcement 2026"
    - "new AI research paper 2026"
    - "AI product launch 2026"
    - "GPT Claude Gemini Grok update 2026"
    - "AI agent tool released 2026"

# Content lenses — used by Claude to tag signals and build the Relevance Map
content_lenses:
  - id: recruiting
    label: "AI in Recruiting & Talent Acquisition"
  - id: marketing
    label: "AI in Marketing"
  - id: sales
    label: "AI in Sales & Business Development"
  - id: productivity
    label: "Personal Productivity with AI"

sources:
  companies:
    enabled: true
    max_results_per_company: 3
    time_range: "w"              # d=day, w=week, m=month
  individuals:
    enabled: true
    max_results_per_person: 3
    time_range: "w"
  general_news:
    enabled: true
    max_results: 10
    time_range: "w"
  builds:
    enabled: true
    max_results: 5             # per query — fewer but higher quality
    time_range: "w"
  reddit:
    enabled: true
    max_results_per_entity: 3   # per company/individual name
    subreddits:
      # High-signal AI communities (breakthrough news, model releases)
      - artificial
      - MachineLearning
      - LocalLLaMA
      - ChatGPT
      - ClaudeAI
      - OpenAI
      - singularity
      - ArtificialIntelligence
      # Lens-specific (lower volume but useful for content angles)
      - recruiting
      - marketing
      - sales
      - productivity

output:
  briefs_dir: "briefs"
  logs_dir: "logs"
  filename_format: "%Y-%m-%d.md"
