schedule:
  cron: "0 7 * * 1-5"           # weekdays at 7 AM (reference only; actual scheduling via MCP or launchd)
  timezone: "Europe/Bratislava"

model:
  name: "claude-sonnet-4-6"
  max_tokens: 4096
  temperature: 0.3               # lower = more factual, less creative

# Curated signal sources — edit these lists to add/remove tracked entities
signals:
  companies:
    # AI labs — primary signal sources
    - name: Anthropic
      domain: anthropic.com
    - name: OpenAI
      domain: openai.com
    - name: Google DeepMind
      domain: deepmind.google
    - name: Microsoft AI
      domain: microsoft.com/en-us/ai
    - name: Meta AI
      domain: ai.meta.com
    - name: xAI
      domain: x.ai
    - name: Mistral AI
      domain: mistral.ai
    - name: Hugging Face
      domain: huggingface.co/blog
    # AI-powered dev tools
